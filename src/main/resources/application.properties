server.port=8080
spring.application.name=shopping-seckill

# 日志配置 — 全局只输出ERROR，彻底压制刷屏
logging.level.root=ERROR
logging.level.com.java.shopping=WARN
logging.level.org.springframework=WARN
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.io.lettuce=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.scheduling=WARN
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.apache.zookeeper=WARN
logging.level.kafka=WARN
logging.level.org.springframework.jdbc=WARN

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=100ms

# Kafka配置
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.retries=0
spring.kafka.producer.acks=1
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.consumer.group-id=shopping-seckill-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.auto-startup=false
# 排除 Kafka 自动装配
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# MySQL配置
spring.datasource.url=jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0

# SQL初始化配置 — 只在首次需要建表时开启
spring.sql.init.mode=never

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.global-config.db-config.id-type=auto

# 应用配置
app.seckill.enabled=true
app.seckill.kafka-enabled=false
app.stock-warmup.enabled=true
